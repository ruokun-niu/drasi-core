name: Trigger Issue Research

on:
  issues:
    types: [labeled]

jobs:
  trigger-research:
    if: github.event.label.name == 'need-research'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger drasi-issue-researcher workflow
        run: |
          gh workflow run drasi-issue-researcher.lock.yml \
            --repo "${{ github.repository_owner }}/.github" \
            --field issue_url="${{ github.event.issue.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}