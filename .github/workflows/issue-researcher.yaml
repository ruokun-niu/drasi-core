name: Trigger Issue Research

on:
  issues:
    types: [labeled]

jobs:
  research:
    if: github.event.label.name == 'needs-research'
    uses: drasi-project/.github/.github/workflows/drasi-issue-researcher.lock.yml@centralized-workflows
    with:
      issue_url: ${{ github.event.issue.html_url }}
    secrets: inherit