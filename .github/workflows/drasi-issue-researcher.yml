# drasi-core/.github/workflows/research.yml
name: Issue Research
on:
  issues:
    types: [labeled]

jobs:
  research:
    if: github.event.label.name == 'needs-research'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger researcher
        run: |
          gh workflow run drasi-issue-researcher.md \
            --repo drasi-project/.github \
            -f issue_url="${{ github.event.issue.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}